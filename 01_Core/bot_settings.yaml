  marcferrando01@gmail.com: marc        # alta: 2026-06-16
  dariogarciaalvarez01@gmail.com: dario        # alta: 2026-06-16
  wallabot01@gmail.com: dario        # formulario enviado logueado como el bot
  # tu.correo@gmail.com: dario       # RELLENA: tu correo personal
  # correo.de.marc@gmail.com: marc   # RELLENA: el correo de Marc

# Responder al remitente con una confirmacion cuando su config se aplica.
# La confirmacion incluye la lista de alertas activas (para poder borrarlas
# luego pegandola en la pestaña "Eliminar alertas" del formulario).
reply_confirmation: true

# ============================================================
#  LLM — cascada de clasificacion (comun a TODOS los usuarios)
# ============================================================
# Se prueban en orden y gana el PRIMERO que responde; 'rules' es el terminal
# (sin IA). En operacion normal solo se usa el primero: el resto son red de
# seguridad y NO ralentizan nada. Cada valor admite override por variable de
# entorno (util para Secrets en CI), que SIEMPRE tiene prioridad sobre esto.
#
# Cascada por defecto: gemini (ancla, capa gratuita estable de Google,
# sin tarjeta) + groq (respaldo, igual de gratis) + rules (red final, sin
# IA, nunca se agota). Fuera de la cascada activa por los motivos vistos en
# jun 2026:
#   cerebras      -> roto (API key invalida en Actions + fallo SSL local)
#   openrouter    -> modelos ':free' limitados a 50 peticiones/dia, insuficiente
#   githubmodels  -> requiere un PAT (mayor riesgo si se filtra), limites poco fiables
# El codigo de estos 3 proveedores sigue intacto en classifier.py: basta
# añadirlos de nuevo a 'cascade' si se resuelven sus problemas.
#
# Alta de cada proveedor (capa gratuita, sin tarjeta):
#   groq          -> console.groq.com            (GROQ_API_KEY)
#   cerebras      -> cloud.cerebras.ai           (CEREBRAS_API_KEY)  1M tok/dia, el mas rapido
#   gemini        -> aistudio.google.com         (GEMINI_API_KEY)
#   openrouter    -> openrouter.ai               (OPENROUTER_API_KEY) modelos ':free', 50/dia
#   githubmodels  -> PAT con permiso models:read (GH_MODELS_TOKEN)
llm:
  cascade: [gemini, groq, rules]

  # Modelo por proveedor (si se omite uno, se usa su valor por defecto).
  models:
    groq:         "llama-3.1-8b-instant"
    cerebras:     "llama-3.3-70b"
    gemini:       "gemini-2.5-flash-lite"
    openrouter:   "meta-llama/llama-3.3-70b-instruct:free"
    githubmodels: "openai/gpt-4o-mini"
    ollama:       "qwen2.5:3b"        # solo si 'ollama' esta en la cascada (local)

  # API keys. Dejalas vacias y usa variables de entorno / GitHub Secrets
  # (recomendado, sobre todo en CI). La env-var del mismo proveedor SIEMPRE
  # manda sobre lo que pongas aqui. NUNCA pegues claves reales en este
  # archivo: esta commiteado en el repo.
  keys:
    groq:         ""    # o variable GROQ_API_KEY
    cerebras:     ""    # o variable CEREBRAS_API_KEY
    gemini:       ""    # o variable GEMINI_API_KEY
    openrouter:   ""    # o variable OPENROUTER_API_KEY
    githubmodels: ""    # o variable GH_MODELS_TOKEN

  # Pausa (segundos) que aplica un proveedor tras un 429 sostenido antes de
  # volver a intentarse (circuit breaker). Override: variable LLM_COOLDOWN.
  cooldown_seconds: 600

  # Nº de anuncios que se agrupan en UNA sola llamada al LLM al clasificar
  # (Tarea 1). Agrupar baja las peticiones/minuto y evita 429 en pasadas
  # grandes. Override: variable LLM_BATCH_SIZE. Por defecto 25.
  batch_size: 25
