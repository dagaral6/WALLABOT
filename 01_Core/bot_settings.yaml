# bot_settings.yaml - Ajustes del BOT (no de los usuarios).
# Este archivo NUNCA lo sobrescriben los correos entrantes: aqui viven
# la lista blanca y las credenciales del buzon.

imap:
  host: imap.gmail.com
  port: 993
  user: wallabot01@gmail.com
  # Se rellena en runtime desde el Secret GMAIL_APP_PASSWORD (ver config_inbox.py).
  # No hardcodear la contraseña real aquí: este archivo va al repo.
  app_password: ""

# Cada cuantos minutos se comprueba el buzon en busca de configs nuevas.
inbox_check_minutes: 5

# Ventana de sueño: el bot NO hace nada (ni busca en Wallapop ni revisa el
# buzon) entre 'start' y 'end' (hora de 'timezone'). Por defecto 01:00-07:00
# de Madrid. 'end' NO se incluye (a las 07:00 ya despierta). Las ejecuciones
# manuales (boton "Run workflow" de GitHub, o "python main.py --force") se la
# saltan. OJO: en GitHub Actions el horario se controla ADEMAS en el workflow
# (.github/workflows/wallabot.yml, paso "gate"); manten ambos coherentes.
sleep_hours:
  enabled: true
  start: 1
  end: 7
  timezone: "Europe/Madrid"

# Lista blanca: correo remitente -> user_id
# El user_id decide el archivo en configs/<user_id>.yaml, el prefijo en la
# base de datos y que config sustituye cada correo nuevo de ese remitente.
# Un remitente que no este aqui se ignora (se marca leido y queda en el log).
allowed_senders:
  marcferrando01@gmail.com: marc        # alta: 2026-06-16
  dariogarciaalvarez01@gmail.com: dario        # alta: 2026-06-16
  wallabot01@gmail.com: dario        # formulario enviado logueado como el bot
  # tu.correo@gmail.com: dario       # RELLENA: tu correo personal
  # correo.de.marc@gmail.com: marc   # RELLENA: el correo de Marc

# Responder al remitente con una confirmacion cuando su config se aplica.
# La confirmacion incluye la lista de alertas activas (para poder borrarlas
# luego pegandola en la pestaña "Eliminar alertas" del formulario).
reply_confirmation: true

# ============================================================
#  BUSQUEDA — filtro por CATEGORIA nativa de Wallapop
# ============================================================
# Restringe TODAS las busquedas a la categoria de juegos de mesa de Wallapop,
# para que keywords genericas (p. ej. "cities", "mare nostrum") dejen de traer
# ropa, libros o videojuegos y los juegos de mesa reales no queden sepultados.
# La API filtra por ID NUMERICO, no por nombre ("Juegos recreativos y de mesa").
#
# category_ids: lista de IDs de categoria. VACIO = sin filtro. Mapeo observado
# en los datos reales (jun 2026; si Wallapop los cambia, re-ejecuta el probe):
#   12579 = Juegos de mesa            -> SI (juegos de mesa puros)
#   12461 = Juegos y juguetes         -> SI (Catan, Carcassonne, Ark Nova...; el
#                                            ruido de juguete/bebe lo descarta el
#                                            gate de titulo)
#   12463 = Libros        24200 = Videojuegos     18000 = Coleccionismo
#   12465 = Moda          200   = Inmobiliaria    12467/13100/19000/20000 = electronica/herramientas
#   17000 = Bicis  ...    -> NO (estos eran el ruido: libros "Mare Nostrum",
#                                Frostpunk PS4, Warhammer "Cities of Sigmar"...)
# Para revisar/ajustar: cada anuncio guarda su category_id en la BD y el HTML de
# revision lo muestra ("cat. Wallapop #..."). Mas precision -> deja solo [12579];
# si ves que pierdes algun juego, mira su category_id y anadelo aqui.
# Re-descubrir IDs: py 03_Diagnostico/probe_categories.py "catan"
search:
  category_ids: [12579, 12461]   # juegos de mesa + juegos/juguetes


# ============================================================
#  RELEVANCIA — gate NLI para keywords ambiguas (Cities, Risk...)
# ============================================================
# Keywords ambiguas cuelan otros juegos que las contienen: de UNA palabra
# ("cities" -> Lost Cities, Underwater Cities, Cities of Sigmar...) o frases
# multi-palabra ("rising sun" -> "Setting Sun Rising", dardos "Rising Sun"...).
# Para esas keywords un gate decide si el anuncio es EXACTAMENTE el juego buscado
# o uno distinto: NLI zero-shot (Hugging Face) sobre el TITULO si hay servicio;
# fallback determinista si no (confusores conocidos + regla de ORDEN contiguo para
# las frases). Solo se dispara en alertas con keyword riesgosa (definidas en
# classifier.py: _RISKY_KEYWORDS), asi que no toca el resto. Reversible: enabled=false.
#
# Token HF: variable de entorno HF_API_TOKEN (Secret en CI). Sin token -> la API
# publica suele ir con cuota baja; si falla, se usa SOLO el fallback determinista.
# Cada valor admite override por variable de entorno (RELEVANCE_ENABLED, NLI_MODEL,
# NLI_MARGIN), que SIEMPRE tiene prioridad sobre esto.
relevance:
  enabled: true
  model: joeddav/xlm-roberta-large-xnli   # multilingue (mejor en español)
  margin: 0.15                            # margen minimo de score para decidir NLI
  # overrides opcionales de confusores por keyword (reemplaza la lista por defecto):
  # confusers:
  #   cities: [lost cities, underwater cities, between two cities, cities of sigmar]


# ============================================================
#  BGG — refuerzo con BoardGameGeek (relevancia + base/expansion)
# ============================================================
# Usa la API XML de BoardGameGeek (XMLAPI2) como "diccionario que se mantiene
# solo": dado un titulo, confirma si es un juego real y si BGG lo clasifica como
# base (boardgame) o expansion (boardgameexpansion). REFUERZO, no autoridad: si
# BGG no reconoce un titulo NO se descarta por eso (ante la duda, dejar pasar);
# solo corrige 'base'->'expansion' cuando BGG dice expansion. Cachea resultados en
# 01_Core/bgg_cache.json (versionado en git, como la BD). Degradacion elegante:
# ante red/timeout/202/429/parseo, BGG se ignora y el bot sigue como hoy.
# DESACTIVADO por defecto: actívalo a conciencia (enabled: true).
# Override por entorno: BGG_ENABLED (y BGG_TIMEOUT/BGG_MAX_RETRIES/BGG_RETRY_WAIT/
# BGG_CACHE_TTL_DAYS).
bgg:
  enabled: true


# ============================================================
#  IDIOMA — detección con langdetect (refuerzo del filtro de idioma)
# ============================================================
# El filtro looks_foreign_language solo acepta es/ca/en. Su vocabulario de listas
# no cubre todos los anuncios extranjeros (p. ej. un titulo italiano con palabras
# fuera de la lista). langdetect añade una señal SECUNDARIA: marca foreign un
# idioma NO permitido (it/fr/de/pt/nl...) con ALTA confianza y SOLO sobre la
# DESCRIPCION (prosa); el titulo no se usa (nombres propios -> falsos positivos,
# p.ej. 'Camel Up Carcassonne' -> it). Exige una descripcion con texto suficiente.
# Ante la duda, dejar pasar. Degradacion elegante: sin langdetect, solo vocabulario.
# Override por entorno: LANGDETECT_ENABLED, LANGDETECT_MIN_PROB, LANGDETECT_MIN_DESC.
language:
  langdetect_enabled: true
  langdetect_min_prob: 0.95     # confianza minima para marcar foreign (alto = conservador)


# ============================================================
#  CATEGORIA por NLI (valida base/expansion/components)
# ============================================================
# La categoria la deciden las REGLAS (resultado provisional); con esto activado, el
# NLI (zero-shot, Hugging Face, mismo modelo que relevance.model, secret
# HF_API_TOKEN) la VALIDA usando sobre todo la DESCRIPCION: corrige los 'base' que
# en realidad son 'components' (insertos, fichas sueltas, cajas vacias) o
# 'expansion'. Solo se invoca cuando las reglas dicen 'base', HAY descripcion y el
# texto tiene vocabulario de accesorio/expansion (gateo por coste). Conservador:
# ante la duda mantiene las reglas; nunca descarta ni marca not_game; no toca lotes.
# Degradacion elegante: sin servicio NLI -> reglas. Reversible: enabled=false.
# Override por entorno: CATEGORY_NLI_ENABLED, CATEGORY_NLI_MARGIN.
category_nli:
  enabled: true
  model: joeddav/xlm-roberta-large-xnli   # multilingue
  margin: 0.15                  # margen minimo de score entre la 1a y 2a hipotesis


# ============================================================
#  LLM — cascada de clasificacion (comun a TODOS los usuarios)
# ============================================================
# Se prueban en orden y gana el PRIMERO que responde; 'rules' es el terminal
# (sin IA). En operacion normal solo se usa el primero: el resto son red de
# seguridad y NO ralentizan nada. Cada valor admite override por variable de
# entorno (util para Secrets en CI), que SIEMPRE tiene prioridad sobre esto.
#
# Cascada por defecto: gemini (ancla, capa gratuita estable de Google,
# sin tarjeta) + groq (respaldo, igual de gratis) + rules (red final, sin
# IA, nunca se agota). Fuera de la cascada activa por los motivos vistos en
# jun 2026:
#   cerebras      -> roto (API key invalida en Actions + fallo SSL local)
#   openrouter    -> modelos ':free' limitados a 50 peticiones/dia, insuficiente
#   githubmodels  -> requiere un PAT (mayor riesgo si se filtra), limites poco fiables
# El codigo de estos 3 proveedores sigue intacto en classifier.py: basta
# añadirlos de nuevo a 'cascade' si se resuelven sus problemas.
#
# Alta de cada proveedor (capa gratuita, sin tarjeta):
#   groq          -> console.groq.com            (GROQ_API_KEY)
#   cerebras      -> cloud.cerebras.ai           (CEREBRAS_API_KEY)  1M tok/dia, el mas rapido
#   gemini        -> aistudio.google.com         (GEMINI_API_KEY)
#   openrouter    -> openrouter.ai               (OPENROUTER_API_KEY) modelos ':free', 50/dia
#   githubmodels  -> PAT con permiso models:read (GH_MODELS_TOKEN)
llm:
  cascade: [gemini, groq, cerebras, openrouter, githubmodels, rules]


  # Modelo por proveedor (si se omite uno, se usa su valor por defecto).
  models:
    groq:         "llama-3.1-8b-instant"
    cerebras:     "llama-3.3-70b"
    gemini:       "gemini-2.5-flash-lite"
    openrouter:   "meta-llama/llama-3.3-70b-instruct:free"
    githubmodels: "openai/gpt-4o-mini"
    ollama:       "qwen2.5:3b"        # solo si 'ollama' esta en la cascada (local)

  # API keys. Dejalas vacias y usa variables de entorno / GitHub Secrets
  # (recomendado, sobre todo en CI). La env-var del mismo proveedor SIEMPRE
  # manda sobre lo que pongas aqui. NUNCA pegues claves reales en este
  # archivo: esta commiteado en el repo.
  keys:
    groq:         ""    # o variable GROQ_API_KEY
    cerebras:     ""    # o variable CEREBRAS_API_KEY
    gemini:       ""    # o variable GEMINI_API_KEY
    openrouter:   ""    # o variable OPENROUTER_API_KEY
    githubmodels: ""    # o variable GH_MODELS_TOKEN

  # Pausa (segundos) que aplica un proveedor tras un 429 sostenido antes de
  # volver a intentarse (circuit breaker). Override: variable LLM_COOLDOWN.
  cooldown_seconds: 600

  # Nº de anuncios que se agrupan en UNA sola llamada al LLM al clasificar
  # (Tarea 1). Agrupar baja las peticiones/minuto y evita 429 en pasadas
  # grandes. Override: variable LLM_BATCH_SIZE. Por defecto 25.
  batch_size: 25
