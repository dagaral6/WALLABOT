# bot_settings.yaml - Ajustes del BOT (no de los usuarios).
# Este archivo NUNCA lo sobrescriben los correos entrantes: aqui viven
# la lista blanca y las credenciales del buzon.

imap:
  host: imap.gmail.com
  port: 993
  user: wallabot01@gmail.com
  app_password: "zbmj kkzj cezy shkg"

# Cada cuantos minutos se comprueba el buzon en busca de configs nuevas.
inbox_check_minutes: 5

# Ventana de sueño: el bot NO hace nada (ni busca en Wallapop ni revisa el
# buzon) entre 'start' y 'end' (hora de 'timezone'). Por defecto 01:00-07:00
# de Madrid. 'end' NO se incluye (a las 07:00 ya despierta). Las ejecuciones
# manuales (boton "Run workflow" de GitHub, o "python main.py --force") se la
# saltan. OJO: en GitHub Actions el horario se controla ADEMAS en el workflow
# (.github/workflows/wallabot.yml, paso "gate"); manten ambos coherentes.
sleep_hours:
  enabled: true
  start: 1
  end: 7
  timezone: "Europe/Madrid"

# Lista blanca: correo remitente -> user_id
# El user_id decide el archivo en configs/<user_id>.yaml, el prefijo en la
# base de datos y que config sustituye cada correo nuevo de ese remitente.
# Un remitente que no este aqui se ignora (se marca leido y queda en el log).
